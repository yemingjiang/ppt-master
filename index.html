            position: relative;

        }

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
        }

        .header-cta {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .cta-btn.primary {
            background: #fff;
            color: var(--primary);
        }

        .cta-btn.primary:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .cta-btn.secondary {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .cta-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.9rem;

        /* Navigation */
        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;

        .nav-content {

            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Main Content */

            font-weight: 600;

            margin-bottom: 50px;

        .project-card {

            border: 1px solid var(--border);

            overflow: hidden;
            transition: all 0.3s ease;

        .project-card:hover {

            border-color: var(--primary);

        .card-preview {

            background: var(--darker);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }

        .card-preview .placeholder {
            font-size: 4rem;
            opacity: 0.3;
        }

        .card-badge {

            top: 12px;
            right: 12px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .card-badge.new {
            background: linear-gradient(135deg, #f97316, #ef4444);
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .tag {
            background: var(--darker);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .tag.style-consulting {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary-light);
        }

        .tag.style-general {
            background: rgba(6, 182, 212, 0.2);
            color: var(--secondary);

        .tag.style-creative {
            background: rgba(245, 194, 231, 0.2);

            border-top: 1px solid var(--border);
            padding: 40px 20px;

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;

        .footer-links a:hover {
            color: var(--primary);
        }

        .footer-copy {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header-cta {
                flex-direction: column;
                align-items: center;
            }

            .stats {
                gap: 20px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }

        /* Hidden class for filtering */
        .hidden {
            display: none !important;
        }
    </style>
</head>

        // Render projects
        function renderProjects(filter = 'all') {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';

            const filtered = filter === 'all'
                ? projects
                : projects.filter(p => p.style === filter);

            filtered.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => {
                    window.location.href = `viewer.html?project=${encodeURIComponent(project.id)}`;
                };

                const styleClass = project.style === 'consulting' ? 'style-consulting'
                    : project.style === 'general' ? 'style-general'
                        : 'style-creative';

                const coverUrl = encodeURI(`examples/${project.id}/svg_final/${project.cover}`);
                const img = document.createElement('img');
                img.src = coverUrl;
                img.alt = project.title;
                img.onerror = function () {
                    this.onerror = null;
                    this.parentElement.innerHTML = '<div class="placeholder">📊</div>';
                };

                card.innerHTML = `
                    <div class="card-preview">
                        ${project.isNew ? '<span class="card-badge new">🆕 新增</span>' : ''}
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${project.title}</h3>
                        <div class="card-meta">
                            <span>📄 ${project.pages} 页</span>
                            <span>🎨 ${project.styleName}</span>
                        </div>
                        <p class="card-desc">${project.desc}</p>
                        <div class="card-tags">
                            <span class="tag ${styleClass}">${project.styleName}</span>
                            ${project.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                    </div>
                `;

                // Insert image into card-preview
                const preview = card.querySelector('.card-preview');
                preview.insertBefore(img, preview.firstChild);

                grid.appendChild(card);
            });
        }

        // Filter buttons
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderProjects(btn.dataset.filter);
            });
        });

        // Initial render
        renderProjects();
